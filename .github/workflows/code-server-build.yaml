name: Build and Push Code-Server

on:
  push:
    paths:
      - 'apps/code-server/**'
  workflow_dispatch:
jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. ONLY bump version if not a renovate commit
      - name: Bump version and push tag
        id: bump_version
        if: "!contains(github.event.head_commit.message, 'renovate')"
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: "code-server-v"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. Build with conditional tags
      - name: Build and push
        env:
          # Use the bumped version if available, otherwise use the short SHA
          VERSION: ${{ steps.bump_version.outputs.new_version || github.sha }}
        run: |
          docker buildx build \
            --push \
            --tag ghcr.io/${{ github.repository }}/code-server:latest \
            --tag ghcr.io/${{ github.repository }}/code-server:$VERSION \
            apps/code-server

      # 3. ONLY update deployment manifest if not a renovate commit
      - name: Update deployment manifest
        if: "!contains(github.event.head_commit.message, 'renovate')"
        run: |
          VERSION=${{ steps.bump_version.outputs.new_version }}
          
          sed -i "s|image: ghcr.io/${{ github.repository }}/code-server:.*|image: ghcr.io/${{ github.repository }}/code-server:$VERSION|" apps/code-server/deployment.yaml
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/code-server/deployment.yaml
          git commit -m "chore: bump code-server to $VERSION [skip ci]" || echo "No changes to commit"
          git push