name: Build and Push Code-Server

on:
  push:
    paths:
      - 'apps/code-server/**' # Changed to trigger on all files in this directory

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: bump_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: "code-server-v"
          # This forces the action to ONLY look at tags starting with code-server-v
          # It prevents it from seeing renovate tags
          custom_tag: ${{ steps.bump_version.outputs.new_tag }} 

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          # Extract the numeric version (e.g., 1.2.3) from code-server-v1.2.3
          VERSION: ${{ steps.bump_version.outputs.new_version }}
        run: |
          docker buildx build \
            --push \
            --tag ghcr.io/${{ github.repository }}/code-server:latest \
            --tag ghcr.io/${{ github.repository }}/code-server:$VERSION \
            apps/code-server

      - name: Update deployment manifest
        run: |
          VERSION=${{ steps.bump_version.outputs.new_version }}
          
          # Use a safer sed delimiter (using | is good, but ensure variable expansion is correct)
          sed -i "s|image: ghcr.io/${{ github.repository }}/code-server:.*|image: ghcr.io/${{ github.repository }}/code-server:$VERSION|" apps/code-server/deployment.yaml
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/code-server/deployment.yaml
          git commit -m "chore: bump code-server to $VERSION [skip ci]" || echo "No changes to commit"
          git push