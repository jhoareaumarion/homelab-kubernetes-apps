apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: workspace-route
  namespace: devpod-{{ .Values.projectName }}
spec:
  parentRefs:
  - name: ingress-gateway # Ensure this matches your actual Gateway name
  hostnames:
  - {{ .Values.domain }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: code-server-service
      port: 8080