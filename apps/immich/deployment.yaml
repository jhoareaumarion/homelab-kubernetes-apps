apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich
  namespace: immich
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich
  template:
    metadata:
      labels:
        app: immich
    spec:
      nodeSelector:
        affected_vlan: "50"
      containers:
      - name: immich
        image: ghcr.io/immich-app/immich-server:v3.0.2@sha256:14390f3dc9512dc3273b12ccee6363d9be16c388699abc3f3fe0498bb9829937
        envFrom:
        - configMapRef:
            name: cm
        env:
        - name: IMMICH_CONFIG_FILE 
          value: /config/immich-config.yaml
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: POSTGRES_PASSWORD
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: POSTGRES_USER
        - name: DB_DATABASE_NAME
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: POSTGRES_DB          
        ports:
        - containerPort: 2283
        volumeMounts:
        - name: library
          mountPath: /usr/src/app/upload
        - name: config-volume
          mountPath: /config
          readOnly: true
      volumes:
      - name: library
        persistentVolumeClaim:
          claimName: library-pvc
      - name: config-volume
        secret:
          secretName: secrets