apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent-nox
  namespace: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent-nox
  template:
    metadata:
      labels:
        app: qbittorrent-nox
    spec:
      nodeSelector:
        affected_vlan: "50"
      containers:
      - name: gluetun
        image: qmcgaw/gluetun:latest
        securityContext:
          capabilities:
            add: ["NET_ADMIN"]
          readOnlyRootFilesystem: false 
        envFrom:
          - configMapRef:
              name: gluetun-cm
          - secretRef:
              name: gluetun-secrets
        ports:
        - name: webui
          containerPort: 8080 
        - name: torrent-tcp
          containerPort: 6881
        - name: torrent-udp
          containerPort: 6881
      - name: qbittorrent
        image: qbittorrentofficial/qbittorrent-nox:5.1.4-lt2-2
        securityContext:
          readOnlyRootFilesystem: true
          runAsUser: 3104
          runAsGroup: 3100
        envFrom:
        - configMapRef:
            name: config-map
        volumeMounts:
        - name: config
          mountPath: /config
        - name: torrents
          mountPath: /torrents
        resources:
          requests:
            memory: "96Mi"
            cpu: "20m"
          limits:
            memory: "512Mi"
            cpu: "200m"
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: config-pvc
      - name: torrents
        persistentVolumeClaim:
          claimName: torrents-pvc