apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent-nox
  namespace: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent-nox
  template:
    metadata:
      labels:
        app: qbittorrent-nox
    spec:
      nodeSelector:
        affected_vlan: "50"
      containers:
      - name: gluetun
        image: qmcgaw/gluetun:v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
        securityContext:
          privileged: true
          capabilities:
            add: ["NET_ADMIN"]
          readOnlyRootFilesystem: false 
        envFrom:
          - configMapRef:
              name: gluetun-cm
          - secretRef:
              name: gluetun-secrets
        volumeMounts:
          - name: tun
            mountPath: /dev/net/tun
        ports:
        - name: webui
          containerPort: 8080 
        - name: torrent-tcp
          containerPort: 6881
        - name: torrent-udp
          containerPort: 6881
      - name: qbittorrent
        image: qbittorrentofficial/qbittorrent-nox:5.2.2-1@sha256:a41fbfe983349e2d81baad1d2a40544143c9e0ec1e79493d091554406e0eab1a
        securityContext:
          readOnlyRootFilesystem: true
          runAsUser: 3104
          runAsGroup: 3100
        envFrom:
        - configMapRef:
            name: config-map
        volumeMounts:
        - name: config
          mountPath: /config
        - name: torrents
          mountPath: /torrents
        resources:
          requests:
            memory: "96Mi"
            cpu: "20m"
          limits:
            memory: "512Mi"
            cpu: "200m"
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: config-pvc
      - name: torrents
        persistentVolumeClaim:
          claimName: torrents-pvc
      - name: tun
        hostPath:
          path: /dev/net/tun