# apps/qbittorrent/qbittorrent-downloads-media-pv.yaml
apiVersion: v1
kind: PersistentVolume
metadata:
  name: qbittorrent-downloads-media-pv
spec:
  capacity:
    storage: 1000Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: truenas.local.hoareau-marion.eu
    path: /mnt/homelab-pool/media/downloads
