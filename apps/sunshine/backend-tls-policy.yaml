apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: sunshine-backend-tls
  namespace: sunshine
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: sunshine-service
  validation:
    hostname: "Sunshine Gamestream Host"
    caCertificateRefs:
      - group: ""
        kind: Secret
        name: sunshine-ca-secret