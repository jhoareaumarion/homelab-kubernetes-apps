apiVersion: v1
kind: Service
metadata:
  name: sunshine-service
  namespace: sunshine
  annotations:
    io.cilium/backend-protocol: "HTTPS"
    io.cilium/tls-insecure-skip-verify: "true"
    io.cilium/http-version: "1.1"
spec:
  ports:
    - name: https
      protocol: TCP
      port: 47990
      targetPort: 47990