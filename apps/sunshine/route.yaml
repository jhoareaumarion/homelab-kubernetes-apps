apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sunshine-route
  namespace: sunshine
spec:
  parentRefs:
    - name: ingress-gateway
      namespace: cluster-gateway
      sectionName: sunshine-https
  hostnames:
    - "sunshine.hoareau-marion.eu"
  rules:
    - filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - "X-Forwarded-For"
              - "X-Forwarded-Proto"
            set:
              - name: "Host"
                value: "sunshine.hoareau-marion.eu"
    - backendRefs:
        - name: sunshine-service
          port: 47990