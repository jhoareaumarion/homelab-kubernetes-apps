apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: sunshine-service-slice
  namespace: sunshine
  labels:
    kubernetes.io/service-name: sunshine-service
addressType: IPv4
ports:
  - name: https
    port: 47990
    protocol: TCP
endpoints:
  - addresses:
      - "10.10.30.10"
    conditions:
      ready: true