apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: sparky-fitness
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sparkyfitness-db
  template:
    metadata:
      labels:
        app: sparkyfitness-db
    spec:
      nodeSelector:
        affected_vlan: "50"
      containers:
        - name: postgres
          image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
          envFrom:
            - configMapRef:
                name: db-cm 
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sparky-fitness-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: sparkyfitness-db-pvc
