# Requires docker run [...] generate first!
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matrix
  namespace: matrix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: matrix
  template:
    metadata:
      labels:
        app: matrix
        gateway-access: matrix
    spec:
      securityContext:
        runAsUser: 991
        runAsGroup: 991
        fsGroup: 991
      containers:
      - name: synapse
        image: matrixdotorg/synapse:v1.151.0
        ports:
        - containerPort: 8008
        envFrom:
        - configMapRef:
            name: config-map
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: synapse-secrets
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config-volume
          mountPath: /data/homeserver.yaml
          subPath: homeserver.yaml
        - name: signing-key-volume
          mountPath: /data/matrix.hoareau-marion.eu.signing.key
          subPath: signing.key
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: data-pvc
      - name: config-volume
        secret:
          secretName: synapse-secrets 
      - name: signing-key-volume
        secret:
          secretName: signing-key 