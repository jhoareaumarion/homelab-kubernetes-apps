apiVersion: apps/v1
kind: Deployment
metadata:
  name: matrix-auth-service
  namespace: synapse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: matrix-auth-service
  template:
    metadata:
      labels:
        app: matrix-auth-service
    spec:
      containers:
      - name: mas
        image: ghcr.io/element-hq/matrix-authentication-service:1.20.0@sha256:1b0cc87ca6bd6186172a123228cfc3be4c94522d5ecc71e7baeaf23e48ce883a
        ports:
        - containerPort: 8080
          name: http
        args: 
          - "server"
        env:
        - name: MAS_CONFIG
          value: /etc/mas/config.yaml
        volumeMounts:
        - name: config
          mountPath: /etc/mas/config.yaml
          subPath: config.yaml
      volumes:
      - name: config
        secret:
          secretName: mas-secrets