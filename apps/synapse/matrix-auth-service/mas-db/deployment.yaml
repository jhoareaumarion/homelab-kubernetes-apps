apiVersion: apps/v1
kind: Deployment
metadata:
  name: mas-postgres
  namespace: synapse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mas-postgres
  template:
    metadata:
      labels:
        app: mas-postgres
    spec:
      nodeSelector:
        affected_vlan: "50"
      containers:
        - name: postgres
          image: docker.io/library/postgres:18
          envFrom:
            - configMapRef:
                name: mas-db-cm 
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mas-secrets
                  key: MAS_POSTGRES_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql
              subPath: pgdata
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: mas-db-pvc