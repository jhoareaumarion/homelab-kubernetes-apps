apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-server
  namespace: code-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: code-server
  template:
    metadata:
      labels:
        app: code-server
    spec:
      initContainers:
      - name: init-workspace
        image: ghcr.io/jhoareaumarion/homelab-kubernetes-apps/code-server:0.0.13@sha256:48253329b1ddbf1c929908e5cbd1bd537b4d2c211621345d39a049cfc34943f1
        securityContext:
          runAsUser: 0
        env:
          - name: GIT_USER_NAME
            valueFrom:
              secretKeyRef:
                name: git-identity-secret
                key: GIT_USER_NAME
          - name: GIT_USER_EMAIL
            valueFrom:
              secretKeyRef:
                name: git-identity-secret
                key: GIT_USER_EMAIL
        command: ["sh", "-c"]
        args: 
          - |
            # 1. Setup workspace/kube folders
            mkdir -p /home/coder/workspace
            mkdir -p /home/coder/.kube
            cp /etc/secrets/config /home/coder/.kube/config

            # 2. GPG setup
            mkdir -p /home/coder/.gnupg
            # Attempt to import. Redirect stderr to ignore warnings if already imported.
            gpg --batch --import /etc/gpg-secret/GPG_KEY 2>/dev/null || true
            echo "pinentry-mode loopback" >> /home/coder/.gnupg/gpg.conf
            echo "allow-loopback-pinentry" >> /home/coder/.gnupg/gpg-agent.conf
            chmod 600 /home/coder/.gnupg/gpg.conf /home/coder/.gnupg/gpg-agent.conf

            # 3. Git config (only if a key is found)
            KEY_ID=$(gpg --list-secret-keys --keyid-format LONG --with-colons 2>/dev/null | grep "^sec" | cut -d: -f5 | head -n 1)
            if [ -n "$KEY_ID" ]; then
                git config --global user.signingkey "$KEY_ID"
                git config --global commit.gpgsign true
                git config --global gpg.program gpg
                git config --global pull.rebase false
                git config --global user.name "$GIT_USER_NAME"
                git config --global user.email "$GIT_USER_EMAIL"
                git config --global --add safe.directory /home/coder/workspace
            fi

            # 4. DevPod setup
            if ! devpod provider list 2>/dev/null | grep -q "kubernetes"; then
                devpod provider add kubernetes
                devpod provider set-options kubernetes \
                    --option KUBERNETES_NAMESPACE=devpod-workspaces \
                    --option STORAGE_CLASS=nfs-client \
                    --option ARCHITECTURE=amd64
            fi
        volumeMounts:
          - name: config
            mountPath: /home/coder
          - name: kubeconfig-secret
            mountPath: /etc/secrets
            readOnly: true
          - name: kube-writable
            mountPath: /home/coder/.kube
          - name: gpg-secret
            mountPath: /etc/gpg-secret
            readOnly: true
      nodeSelector:
        affected_vlan: "50"
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: code-server
          image: ghcr.io/jhoareaumarion/homelab-kubernetes-apps/code-server:0.0.13@sha256:48253329b1ddbf1c929908e5cbd1bd537b4d2c211621345d39a049cfc34943f1
          args: ["--bind-addr", "0.0.0.0:8080", "/home/coder/workspace"]
          ports:
            - containerPort: 8080
          env:
            - name: GIT_USER_NAME
              valueFrom:
                secretKeyRef:
                  name: git-identity-secret
                  key: GIT_USER_NAME
            - name: GIT_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: git-identity-secret
                  key: GIT_USER_EMAIL
            - name: TZ
              value: "Europe/Paris"
            - name: CODE_SERVER_PROXY_DOMAIN
              value: "code-server.hoareau-marion.eu"
            - name: PROXY_DOMAIN
              value: "code-server.hoareau-marion.eu"
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: code-server-password
                  key: password
          volumeMounts:
            - name: config
              mountPath: /home/coder
            - name: config-yaml
              mountPath: /home/coder/.config/code-server/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: kube-writable
              mountPath: /home/coder/.kube
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: code-server-pvc
        - name: config-yaml
          configMap:
            name: code-server-config
        - name: kubeconfig-secret
          secret:
            secretName: kubeconfig
        - name: kube-writable
          emptyDir: {}
        - name: gpg-secret
          secret:
            secretName: git-identity-secret
            items:
            - key: GPG_KEY
              path: GPG_KEY