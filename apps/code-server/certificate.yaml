apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-code-server
  namespace: code-server
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  secretName: code-server-tls
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  dnsNames:
    - code-server.local.hoareau-marion.eu