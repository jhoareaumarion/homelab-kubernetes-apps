# apps/jellyfin/route.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellyfin-route
  namespace: jellyfin
spec:
  parentRefs:
    - name: ingress-gateway
      namespace: cluster-gateway
      sectionName: jellyfin-https     
  hostnames:
    - "jellyfin.hoareau-marion.eu"
  rules:
    - filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: "X-Forwarded-Proto"
                value: "https"
    - backendRefs:
        - name: jellyfin
          port: 8096
