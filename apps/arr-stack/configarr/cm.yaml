        language_profiles:
          - name: "English DUB"
            languages: ["English"]
            subtitles: ["English", "French"]
            required: "English"
            allowed: ["English", "French"]

          - name: "French DUB"
            languages: ["French"]
            subtitles: []
            required: "French"
            allowed: ["French"]

          - name: "Japanese DUB"
            languages: ["Japanese"]
            subtitles: ["English"]
            required: "Japanese"
            allowed: ["Japanese", "English"]

