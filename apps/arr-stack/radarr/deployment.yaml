apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: radarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      nodeSelector:
        affected_vlan: "50"
      initContainers:
      - name: setup-run
        image: busybox@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        command:
          - sh
          - -c
          - |
            chmod 0755 /run
            chown 3103:3100 /run
            chown -R 3103:3100 /config
        volumeMounts:
        - name: run-tmpfs
          mountPath: /run
        - name: config
          mountPath: /config
      containers:
      - name: radarr
        image: lscr.io/linuxserver/radarr:6.2.1@sha256:39da107b5a9371fdaa651bd188049b863716a815385eb3a30d41071b7e1aeb33
        securityContext:
          allowPrivilegeEscalation: false
          runAsUser: 3103
          runAsGroup: 3100
        envFrom:
        - configMapRef:
            name: config-map
        ports:
        - name: radarr
          containerPort: 7878
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /config
        - name: media-data
          mountPath: /media_data
        - name: run-tmpfs
          mountPath: /run
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "1"
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: config-pvc
      - name: media-data
        persistentVolumeClaim:
          claimName: media-data-pvc
      - name: run-tmpfs
        emptyDir:
          medium: Memory
