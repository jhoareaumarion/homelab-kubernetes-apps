  # ACTUAL BUDGET
  ###
  - name: actual-budget-http
    hostname: "actual-budget.hoareau-marion.eu"
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            gateway-access: actual-budget
  - name: actual-budget-https
    hostname: "actual-budget.hoareau-marion.eu"
    port: 443  
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
        - name: actual-budget-hoareau-marion-eu-tls
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            gateway-access: actual-budget  
