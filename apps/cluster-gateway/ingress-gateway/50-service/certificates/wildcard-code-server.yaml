apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-codeserver-tls
  namespace: cluster-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  secretName: wildcard-codeserver-tls
  issuerRef:
    name: letsencrypt-dns # Must match the name in Step 2
    kind: ClusterIssuer
  dnsNames:
    - "*.code-server.hoareau-marion.eu"