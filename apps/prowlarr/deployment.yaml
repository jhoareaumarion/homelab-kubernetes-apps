apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: prowlarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      nodeSelector:
        affected_vlan: "50"
      securityContext:
        runAsUser: 3101
        fsGroup: 3100
      containers:
      - name: prowlarr
        image: lscr.io/linuxserver/prowlarr:2.3.0.5236-ls139
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          readOnlyRootFilesystem: false
        envFrom:
        - configMapRef:
            name: config-map
        ports:
        - name: prowlarr
          containerPort: 9696
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /config
        - name: run
          mountPath: /run
        resources:
          requests:
            memory: "256Mi"
            cpu: "1"
          limits:
            memory: "1Gi"
            cpu: "1"
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: config-pvc
      - name: run
        emptyDir:
          medium: Memory
          sizeLimit: 10Mi