apiVersion: v1
kind: ConfigMap
metadata:
  name: cm
  namespace: sftpgo
data:
  DISABLED_LOGIN_METHODS: "9"
  SFTPGO_FTPD__BINDINGS__0__PORT: "2121"    
  # 0 = Plain, 1 = Explicit TLS, 2 = Implicit TLS     
  SFTPGO_FTPD__BINDINGS__0__TLS_MODE: "1"       
  SFTPGO_FTPD__PASSIVE_PORT_RANGE__START: "50000"
  SFTPGO_FTPD__PASSIVE_PORT_RANGE__END: "50004"
  SFTPGO_FTPD__BINDINGS__0__PASSIVE_HOST: "ftp.hoareau-marion.eu"
  SFTPGO_FTPD__BINDINGS__0__CERTIFICATE_FILE: "/etc/sftpgo/certs/tls.crt"
  SFTPGO_FTPD__BINDINGS__0__CERTIFICATE_KEY_FILE: "/etc/sftpgo/certs/tls.key"