apiVersion: v1
kind: ConfigMap
metadata:
  name: datasources
  namespace: grafana
  labels:
    grafana_datasource: "1"
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.prometheus.svc.cluster.local:9090 # Adjust to your Prometheus service internal URL
        isDefault: true
        editable: true